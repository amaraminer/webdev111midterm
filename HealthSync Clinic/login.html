<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HealthSync Clinic</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
  </div>

  <main class="portal-shell" style="min-height: 100vh; display: grid; place-items: center;">
    <section class="login-panel" style="max-width: 480px; width: 100%;">
      <div class="brand-mark" style="margin: 0 auto 24px;">HS</div>
      <h2 style="text-align: center;">Welcome Back</h2>
      <p style="text-align: center; margin-bottom: 24px;" class="helper-text">Select a mock role to view the dashboards.</p>
      
      <form id="loginForm">
        <div class="field-group">
          <label for="roleSelect">Select Account Role</label>
          <select id="roleSelect" style="min-height: 52px; padding: 0 16px; border-radius: 14px; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.94); font: inherit;">
            <option value="patient">Patient / User</option>
            <option value="staff">Clinic Staff</option>
          </select>
        </div>
        <button type="submit" class="submit-button" style="width: 100%; margin-top: 12px;">Sign In</button>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
