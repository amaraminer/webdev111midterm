<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FreshBite Prep</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-visuals"></div> <main class="login-wrapper">
        <div class="glass-card fade-in">
            <div class="brand-header">
                <span class="logo-icon">🥗</span>
                <h1>FreshBite <span>Prep</span></h1>
                <p>Fuel your body with the best.</p>
            </div>

            <form id="standaloneLoginForm" class="modern-form">
                <div class="input-container">
                    <input type="text" id="user" required>
                    <label>Username</label>
                    <div class="bar"></div>
                </div>
                <div class="input-container">
                    <input type="password" id="pass" required>
                    <label>Password</label>
                    <div class="bar"></div>
                </div>
                <button type="submit" class="glow-btn">Access Dashboard</button>
            </form>
            <div class="form-footer">
                <a href="#">Forgot Password?</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
