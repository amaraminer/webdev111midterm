<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Vista Resort | Luxury Escape</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <a href="login.html" class="logo">LUNA VISTA<span>RESORT</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="login.html" class="active">Home</a></li>
                <li><a href="index.html">Reservation</a></li>
                <li><a href="#" class="btn-nav">Book Now</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero-section">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="bg-video.mp4" type="video/mp4">
        </video>
        
        <div class="overlay"></div>

        <div class="login-container">
            <div class="glass-box">
                <h1>Welcome to Paradise</h1>
                <p>Experience the ultimate Boracay getaway.</p>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="email" id="email" required>
                        <label>Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" required>
                        <label>Password</label>
                    </div>
                    <button type="submit" class="main-btn">Sign In</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
